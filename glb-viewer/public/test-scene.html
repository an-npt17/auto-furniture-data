<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Babylon.js Test</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #renderCanvas {
        width: 100%;
        height: 100vh;
        display: block;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="info">
      <div>Babylon.js Basic Test</div>
      <div>Press 'i' to open inspector</div>
      <div id="status">Initializing...</div>
    </div>

    <script type="module">
      import * as BABYLON from "https://cdn.babylonjs.com/babylon.js";
      import "https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js";
      import "https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js";

      const canvas = document.getElementById("renderCanvas");
      const statusEl = document.getElementById("status");

      const engine = new BABYLON.Engine(canvas, true);
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.8, 0.8, 0.85, 1);

      // Camera
      const camera = new BABYLON.ArcRotateCamera(
        "camera",
        0,
        Math.PI / 4,
        10,
        BABYLON.Vector3.Zero(),
        scene,
      );
      camera.attachControl(canvas, true);

      // Light
      const light = new BABYLON.HemisphericLight(
        "light",
        new BABYLON.Vector3(0, 1, 0),
        scene,
      );
      light.intensity = 1.2;

      // Ground
      const ground = BABYLON.MeshBuilder.CreateGround(
        "ground",
        { width: 20, height: 20 },
        scene,
      );
      const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
      groundMat.diffuseColor = new BABYLON.Color3(0.4, 0.4, 0.45);
      ground.material = groundMat;

      // Test boxes
      const box1 = BABYLON.MeshBuilder.CreateBox("box1", { size: 2 }, scene);
      box1.position.y = 1;
      const mat1 = new BABYLON.StandardMaterial("mat1", scene);
      mat1.diffuseColor = new BABYLON.Color3(1, 0, 0);
      box1.material = mat1;

      const box2 = BABYLON.MeshBuilder.CreateBox("box2", { size: 1.5 }, scene);
      box2.position = new BABYLON.Vector3(3, 0.75, 0);
      const mat2 = new BABYLON.StandardMaterial("mat2", scene);
      mat2.diffuseColor = new BABYLON.Color3(0, 1, 0);
      box2.material = mat2;

      const sphere = BABYLON.MeshBuilder.CreateSphere(
        "sphere",
        { diameter: 2 },
        scene,
      );
      sphere.position = new BABYLON.Vector3(-3, 1, 0);
      const mat3 = new BABYLON.StandardMaterial("mat3", scene);
      mat3.diffuseColor = new BABYLON.Color3(0, 0, 1);
      sphere.material = mat3;

      statusEl.textContent = "Scene ready! 3 test objects loaded.";

      // Inspector toggle
      window.addEventListener("keydown", (e) => {
        if (e.key === "i") {
          if (scene.debugLayer.isVisible()) {
            scene.debugLayer.hide();
          } else {
            scene.debugLayer.show();
          }
        }
      });

      engine.runRenderLoop(() => {
        scene.render();
      });

      window.addEventListener("resize", () => {
        engine.resize();
      });
    </script>
  </body>
</html>
