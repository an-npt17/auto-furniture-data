<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene Viewer - Load Manifest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #252525;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #toolbar .sep { width: 1px; height: 24px; background: #444; margin: 0 4px; }

    #toolbar button,
    #toolbar label.file-btn {
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #333;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
      user-select: none;
    }

    #toolbar button:hover,
    #toolbar label.file-btn:hover { background: #444; }

    #toolbar button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    #toolbar .info {
      margin-left: auto;
      font-size: 12px;
      color: #888;
    }

    #toolbar .hint {
      font-size: 12px;
      color: #9aa4b2;
    }

    #toolbar .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #c9d1d9;
    }

    /* ── Main area ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #202020;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #details-panel {
      border-top: 1px solid #333;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #1b1b1b;
      max-height: 42%;
      overflow: auto;
    }

    #details-panel.hidden { display: none; }

    #details-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9aa4b2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 11px;
      color: #8c8c8c;
    }

    .field input {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #111;
      color: #eee;
      font-size: 12px;
    }

    .details-actions {
      display: flex;
      gap: 8px;
    }

    .details-actions button {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2f2f2f;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
    }

    .details-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #777;
      padding: 10px 14px 7px;
      border-bottom: 1px solid #2a2a2a;
    }

    #object-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .object-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .object-item:hover { background: #2a2a2a; }
    .object-item.selected { background: #1b3a72; }

    .object-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
    }

    .object-item .coords {
      font-size: 10px;
      color: #666;
      font-family: 'Courier New', monospace;
    }

    .empty-state {
      padding: 16px 14px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    /* ── Viewport ── */
    #viewer-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    #viewer-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Loading overlay ── */
    #loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      font-size: 14px;
      z-index: 100;
    }

    #loading-overlay.active { display: flex; }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #4488ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    #loading-text {
      font-size: 13px;
      color: #aaa;
    }

    #loading-progress {
      font-size: 12px;
      color: #666;
      font-family: 'Courier New', monospace;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="toolbar">
    <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none" />
    <label for="folder-input" class="file-btn">Load Folder</label>
    <button type="button" id="btn-load-output">Load Output Folder</button>
    <button type="button" id="btn-bind-folder">Bind Folder</button>
    <div class="sep"></div>
    <label class="toggle">
      <input type="checkbox" id="toggle-presets" />
      Preset colors
    </label>
    <button type="button" id="btn-reset-camera">Reset Camera</button>
    <button type="button" id="btn-clear-scene">Clear Scene</button>
    <div class="hint">WASD move, mouse look, wheel zoom</div>
    <div class="info">
      <span id="object-count">No objects loaded</span>
    </div>
  </div>

  <div id="main">

    <div id="sidebar">
      <div class="sidebar-section-title">Objects (<span id="list-count">0</span>)</div>
      <div id="object-list">
        <div class="empty-state">
          Click "Load Folder" and select the export folder containing:<br>
          • manifest.json<br>
          • matching .glb files
        </div>
      </div>
      <div id="details-panel" class="hidden">
        <h3>Metadata</h3>
        <div class="field">
          <label for="field-label">Label</label>
          <input id="field-label" type="text" />
        </div>
        <div class="field">
          <label for="field-file-name">File Name</label>
          <input id="field-file-name" type="text" />
        </div>
        <div class="field">
          <label for="field-scale">Scale</label>
          <input id="field-scale" type="text" placeholder="x, y, z" />
        </div>
        <div class="field">
          <label for="field-location">Location</label>
          <input id="field-location" type="text" placeholder="x, y, z" />
        </div>
        <div class="field">
          <label for="field-category">Category</label>
          <select id="field-category">
            <option value="furniture">furniture</option>
            <option value="wall">wall</option>
          </select>
        </div>
        <div class="details-actions">
          <button id="btn-save-metadata" type="button">Save JSON</button>
          <button id="btn-download-json" type="button">Download JSON</button>
        </div>
      </div>
    </div>

    <div id="viewer-container">
      <canvas id="render-canvas"></canvas>
      <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <span id="loading-text">Loading...</span>
        <span id="loading-progress"></span>
      </div>
    </div>

  </div>

  <script type="module" src="/scene-viewer.js"></script>
</body>
</html>
