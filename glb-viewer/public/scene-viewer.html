<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Viewer - Load Manifest</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        background: #252525;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      #toolbar .sep {
        width: 1px;
        height: 24px;
        background: #444;
        margin: 0 4px;
      }

      #toolbar button,
      #toolbar label.file-btn {
        padding: 6px 16px;
        border-radius: 4px;
        border: 1px solid #444;
        background: #333;
        color: #e0e0e0;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
        user-select: none;
      }

      #toolbar select {
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #444;
        background: #333;
        color: #e0e0e0;
        font-size: 13px;
        min-width: 160px;
      }

      #toolbar button:hover,
      #toolbar label.file-btn:hover {
        background: #444;
      }

      #toolbar button:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }

      #toolbar .info {
        margin-left: auto;
        font-size: 12px;
        color: #888;
      }

      #toolbar .hint {
        font-size: 12px;
        color: #9aa4b2;
      }

      #toolbar .toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #c9d1d9;
      }

      /* ── Main area ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      #sidebar {
        width: 260px;
        flex-shrink: 0;
        background: #202020;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #sidebar.dropdown-open {
        overflow: visible;
      }

      #details-panel {
        border-top: 1px solid #333;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #1b1b1b;
        max-height: 42%;
        overflow: auto;
      }

      #details-panel.dropdown-open {
        overflow: visible;
        position: relative;
        z-index: 2;
      }

      #details-panel.hidden {
        display: none;
      }

      #details-panel h3 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9aa4b2;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field label {
        font-size: 11px;
        color: #8c8c8c;
      }

      .field input {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #111;
        color: #eee;
        font-size: 12px;
      }

      .field select {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #111;
        color: #eee;
        font-size: 12px;
      }

      .details-actions {
        display: flex;
        gap: 8px;
      }

      .details-actions button {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #2f2f2f;
        color: #eee;
        cursor: pointer;
        font-size: 12px;
      }

      .details-actions button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .sidebar-section-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #777;
        padding: 10px 14px 7px;
        border-bottom: 1px solid #2a2a2a;
      }

      #object-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
      }

      .object-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.1s;
      }

      .object-item:hover {
        background: #2a2a2a;
      }
      .object-item.selected {
        background: #1b3a72;
      }

      .object-item.group-row {
        background: rgba(68, 136, 255, 0.08);
        font-weight: 600;
      }

      .object-item.child-row {
        padding-left: 26px;
        background: rgba(255, 255, 255, 0.02);
      }

      .object-item.child-row .name {
        color: #b8c7e0;
      }

      .object-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #ccc;
      }

      .object-item .coords {
        font-size: 10px;
        color: #666;
        font-family: "Courier New", monospace;
      }

      .empty-state {
        padding: 16px 14px;
        font-size: 12px;
        color: #666;
        line-height: 1.5;
      }

      /* ── Viewport ── */
      #viewer-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0a0a0a;
      }

      #viewer-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* ── Loading overlay ── */
      #loading-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
        z-index: 100;
      }

      #loading-overlay.active {
        display: flex;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: #4488ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      #loading-text {
        font-size: 13px;
        color: #aaa;
      }

      #loading-progress {
        font-size: 12px;
        color: #666;
        font-family: "Courier New", monospace;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <select id="folder-select">
        <option value="">-- Select folder --</option>
      </select>
      <button type="button" id="btn-load-folder">Load</button>
      <div class="sep"></div>
      <label class="toggle">
        <input type="checkbox" id="toggle-presets" />
        Preset colors
      </label>
      <button type="button" id="btn-reset-camera">Reset Camera</button>
      <button type="button" id="btn-clear-scene">Clear Scene</button>
      <div class="hint">WASD move, mouse look, wheel zoom</div>
      <div class="info">
        <span id="object-count">No objects loaded</span>
      </div>
    </div>

    <div id="main">
      <div id="sidebar">
        <div class="sidebar-section-title">
          Objects (<span id="list-count">0</span>)
        </div>
        <div id="object-list">
          <div class="empty-state">
            Select a folder with metadata.json and click "Load"
          </div>
        </div>
        <div id="details-panel" class="hidden">
          <h3>Metadata</h3>
          <div class="field">
            <label for="field-name">Name</label>
            <input id="field-name" type="text" />
          </div>
          <div class="field">
            <label for="field-category">Category</label>
            <select id="field-category">
              <option value="">-- Select category --</option>
              <option value="bedroom">bedroom</option>
              <option value="storage">storage</option>
              <option value="tables-chairs">tables-chairs</option>
              <option value="sofa">sofa</option>
              <option value="lighting">lighting</option>
              <option value="plants">plants</option>
              <option value="xhome">xhome</option>
              <option value="other">other</option>
              <option value="rugs">rugs</option>
              <option value="architecture">architecture</option>
              <option value="decor">decor</option>
              <option value="office">office</option>
              <option value="living-room">living-room</option>
            </select>
          </div>
          <div class="field">
            <label for="field-object-role">Object Role</label>
            <select id="field-object-role">
              <option value="">-- No object role --</option>
              <option value="null">null</option>
              <option value="window">window</option>
              <option value="door">door</option>
            </select>
          </div>
          <div class="field">
            <label for="field-placement-type">Placement Type</label>
            <select id="field-placement-type">
              <option value="floor">floor</option>
              <option value="wall">wall</option>
              <option value="ceiling">ceiling</option>
            </select>
          </div>
          <div class="field">
            <label for="field-price">Price</label>
            <input id="field-price" type="text" />
          </div>
          <div class="details-actions">
            <button id="btn-save-metadata" type="button">Save</button>
          </div>
          <div
            id="save-status"
            style="font-size: 11px; color: #6a6; margin-top: 4px"
          ></div>
        </div>
      </div>

      <div id="viewer-container">
        <canvas id="render-canvas"></canvas>
        <div id="loading-overlay">
          <div class="loading-spinner"></div>
          <span id="loading-text">Loading...</span>
          <span id="loading-progress"></span>
        </div>
      </div>
    </div>

    <script type="module" src="/scene-viewer.js"></script>
  </body>
</html>
